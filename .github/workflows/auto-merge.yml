name: Auto-merge

# The persistent actor that drains the bot-PR queue.
#
# The routine harness opens every agent PR as a *draft* into `main` and expects
# the opening agent to come back across a stateless restart to mark-ready → wait
# → squash-merge. That return trip is exactly what keeps failing, so green PRs
# pile up (see AGENTS.md "Merge your green PRs"). This workflow does both halves
# instead — it re-evaluates whenever a PR goes ready or its CI finishes, then:
#   * auto-READIES any green `claude/*` draft (the flip the opening agent owes but
#     never returns to make — done via the GraphQL markPullRequestReadyForReview
#     mutation, since the REST API can't toggle draft state), and
#   * squash-MERGES any non-draft PR that clears every gate.
# It does the same thing repo-native auto-merge would, so it heals the queue
# whether or not that toggle is ever set.
#
# Conservative by construction — a draft is only readied, and a PR is only
# merged, when ALL of these hold:
#   * base branch is `main`
#   * head branch starts with `claude/` (the harness prefix — this keeps it off
#     Carl's and Copilot's PRs)
#   * the `build` check (Test workflow) is green
#   * every `playtest (...)` matrix check is green, and no check is failing or
#     still running
# Merging additionally requires the branch to be current with `main` (if it is
# behind, it update-branches and lets the next trigger retry) and conflict-free.
# Anything else is skipped silently. It never force-merges a red or stale PR, and
# readying a green draft is safe: the merge gate still refuses anything not
# cleanly mergeable, so a stale one just becomes an ordinary behind/dirty PR the
# merge gate already handles.

on:
  pull_request:
    types: [ready_for_review, synchronize, opened, reopened]
  workflow_run:
    workflows: [Test, Playtest]
    types: [completed]
  check_suite:
    types: [completed]

# Serialize so two triggers firing at once can't race on the same merge.
concurrency:
  group: auto-merge
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate open PRs and squash-merge the green ones
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', base: 'main', per_page: 100,
            });
            core.info(`Evaluating ${prs.length} open PR(s) into main`);

            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            for (const pr of prs) {
              const tag = `#${pr.number} (${pr.head.ref})`;

              // --- static gates ---------------------------------------------
              // Note: draft is NOT a skip here — a green draft gets readied below.
              if (pr.base.ref !== 'main') { core.info(`${tag} skip: base ${pr.base.ref}`); continue; }
              if (!pr.head.ref.startsWith('claude/')) {
                core.info(`${tag} skip: head not claude/*`);
                continue;
              }

              // --- checks gate ----------------------------------------------
              const sha = pr.head.sha;
              const checks = await github.paginate(github.rest.checks.listForRef, {
                owner, repo, ref: sha, per_page: 100,
              });
              // No checks yet means CI is still spinning up — wait. (Docs-only PRs
              // still run the build/playtest jobs via the step-gate in
              // test.yml/playtest.yml; the jobs just skip their expensive steps and
              // report green, so the checks are always present.)
              if (checks.length === 0) { core.info(`${tag} skip: no checks yet`); continue; }

              const running = checks.filter((c) => c.status !== 'completed');
              if (running.length) {
                core.info(`${tag} skip: ${running.length} check(s) still running`);
                continue;
              }
              const passing = new Set(['success', 'neutral', 'skipped']);
              const failed = checks.filter((c) => !passing.has(c.conclusion));
              if (failed.length) {
                core.info(`${tag} skip: failing check(s): ${failed.map((c) => c.name).join(', ')}`);
                continue;
              }

              // Commit statuses (in case a required gate is a status, not a check run).
              const status = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: sha });
              if (status.data.state === 'failure' || status.data.state === 'error') {
                core.info(`${tag} skip: commit status ${status.data.state}`);
                continue;
              }

              // Require the two coverage gates to actually be present AND green, so a
              // PR with no real CI can never slip through. Docs-only PRs still run
              // the build/playtest jobs (they report green after skipping their
              // expensive steps), so this holds for them too — no waiver needed.
              const green = checks
                .filter((c) => c.conclusion === 'success')
                .map((c) => c.name);
              const hasBuild = green.includes('build');
              const hasPlaytest = green.some((n) => n.startsWith('playtest'));
              if (!hasBuild || !hasPlaytest) {
                core.info(`${tag} skip: required checks missing (build:${hasBuild} playtest:${hasPlaytest})`);
                continue;
              }

              // --- draft-ready gate -----------------------------------------
              // A green draft is the hand-off the opening agent never returns to
              // make. Flip it ready (REST can't set draft state, so use GraphQL);
              // the resulting ready_for_review event re-triggers this workflow,
              // which then runs the merge path below on the now-non-draft PR.
              if (pr.draft) {
                core.info(`${tag} green draft → marking ready for review`);
                try {
                  await github.graphql(
                    `mutation($id: ID!) {
                       markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                         pullRequest { number }
                       }
                     }`,
                    { id: pr.node_id },
                  );
                  core.info(`${tag} readied ✅ (merge retries on the ready event)`);
                } catch (e) {
                  core.info(`${tag} mark-ready failed: ${e.message}`);
                }
                continue;
              }

              // --- mergeability gate ----------------------------------------
              // GitHub computes `mergeable` async; it may be null right after a
              // push, so poll a few times before deciding.
              let fresh = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
              for (let i = 0; i < 4 && fresh.data.mergeable === null; i++) {
                await sleep(2000);
                fresh = await github.rest.pulls.get({ owner, repo, pull_number: pr.number });
              }
              const state = fresh.data.mergeable_state;

              if (state === 'behind') {
                core.info(`${tag} behind main → update-branch, will retry on next trigger`);
                try {
                  await github.rest.pulls.updateBranch({ owner, repo, pull_number: pr.number });
                } catch (e) {
                  core.info(`${tag} update-branch failed: ${e.message}`);
                }
                continue;
              }
              if (fresh.data.mergeable !== true || state === 'dirty') {
                core.info(`${tag} skip: not cleanly mergeable (mergeable=${fresh.data.mergeable}, state=${state})`);
                continue;
              }

              // --- merge ----------------------------------------------------
              // Build an explicit, sanitized squash message instead of letting
              // GitHub compose one: passing our own message both strips bot
              // trailers (Claude-Session:, the "Generated by Claude Code"
              // footer) carried over from the branch commit body, and stops
              // GitHub auto-appending its own Co-authored-by trailer (it only
              // generates that when it builds the message itself, crediting
              // the branch commit's git author — every routine commits as
              // "Claude <noreply@anthropic.com>").
              const commitTitle = `${pr.title} (#${pr.number})`;
              let bodySrc = pr.body || '';
              try {
                const commits = await github.paginate(github.rest.pulls.listCommits, {
                  owner, repo, pull_number: pr.number, per_page: 100,
                });
                if (commits.length === 1) {
                  bodySrc = commits[0].commit.message.split('\n').slice(1).join('\n');
                }
              } catch (e) {
                core.info(`${tag} listCommits failed, falling back to PR body: ${e.message}`);
              }
              const stripLine = (l) =>
                /^\s*co-authored-by:/i.test(l) ||
                /^\s*claude-session:\s/i.test(l) ||
                /^\s*_?generated by \[?claude code/i.test(l) ||
                /^\s*https:\/\/claude\.ai\/code\/session/i.test(l);
              const commitMessage = bodySrc
                .split('\n').filter((l) => !stripLine(l)).join('\n')
                .replace(/\n{3,}/g, '\n\n').trim();

              core.info(`${tag} all gates green → squash-merging`);
              try {
                await github.rest.pulls.merge({
                  owner, repo, pull_number: pr.number, merge_method: 'squash',
                  commit_title: commitTitle, commit_message: commitMessage,
                });
                core.info(`${tag} merged ✅`);
              } catch (e) {
                core.info(`${tag} merge failed: ${e.message}`);
              }
            }

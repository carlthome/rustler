name: Playtest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR when new commits land; let main runs
# complete so every merged commit is verified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  playtest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Each scenario gets its own runner so the bot scripts run
      # concurrently instead of back-to-back in one job — the slowest single
      # scenario sets the wall-clock instead of their sum. Same coverage,
      # same scripts, just fanned out.
      matrix:
        scenario:
          [
            groove_dash,
            menu_to_game,
            campaign_tutorial,
            npc_steal,
            player_steal,
            steal_defense,
            steal_evade,
            revenge,
          ]
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache the downloaded .deb files for scripts/ci-deps.sh's apt install so
      # a warm cache skips the network fetch. This was the single biggest
      # source of wall-clock variance across the matrix (17s-70s per job for
      # the exact same install) since every scenario job provisions from a
      # cold runner. apt still detects version mismatches and re-fetches when
      # needed, so a stale cache just falls back to today's behavior.
      #
      # Only cache the *.deb files, not the whole archives dir: apt-get leaves
      # behind archives/lock (root:root, mode 640) and archives/partial/
      # (_apt:root, mode 700), both unreadable by the non-root runner user, so
      # caching the directory made every save fail with "Permission denied"
      # and the restore always miss — this cache never actually worked.
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          key: ${{ runner.os }}-apt-${{ hashFiles('scripts/ci-deps.sh') }}

      # Install the system libraries from default.nix via apt and configure a
      # headless null-audio device (no Nix in this job — see PR #16).
      - name: Install system dependencies
        run: bash scripts/ci-deps.sh

      # scripts/playtest.sh auto-detects the absence of Nix and falls back to
      # plain cargo, wrapping the bot in xvfb with a software GL backend.
      - name: Build and run playtest
        run: bash scripts/playtest.sh ${{ matrix.scenario }}

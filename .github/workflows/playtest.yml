name: Playtest
on: [push, pull_request]
jobs:
  playtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Cache Cargo artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Configure headless ALSA
        run: printf '%s\n' 'pcm.!default {' '  type null' '}' > "$HOME/.asoundrc"
      - name: Install graphics libraries
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxkbcommon-dev libgbm-dev libgl1-mesa-dri libglx-mesa0 libegl1 mesa-vulkan-drivers
      - name: Build
        run: nix develop . --command cargo build
      - name: Run playtests
        run: bash scripts/playtest.sh
        env:
          WGPU_BACKEND: vulkan,gl
          WINIT_UNIX_BACKEND: x11
          LIBGL_ALWAYS_SOFTWARE: 1
          MESA_LOADER_DRIVER_OVERRIDE: llvmpipe

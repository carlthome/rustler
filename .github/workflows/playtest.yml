name: Playtest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The workflow only checks out code and restores caches.
permissions:
  contents: read

# Cancel superseded runs on the same PR when new commits land; let main runs
# complete so every merged commit is verified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # See test.yml — docs-only PRs skip the expensive steps but the playtest jobs
  # still run and report success, keeping the required checks present + green.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect game changes
        id: detect
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if [ -z "$BASE" ]; then BASE="${{ github.event.before }}"; HEAD="${{ github.sha }}"; fi
          if [ -z "$BASE" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          echo "Changed files:"; echo "$CHANGED"
          if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qvE '(^|/)\.github/|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false (docs or GitHub configuration only)"; echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  playtest:
    needs: changes
    strategy:
      fail-fast: false
      # Each focused scenario gets its own runner so PR checks run concurrently
      # instead of back-to-back. The sequential full-campaign check runs after
      # main pushes below, where its coverage does not delay review.
      matrix:
        scenario:
          [
            groove_dash,
            menu_to_game,
            campaign_tutorial,
            campaign_escape,
            campaign_loss,
            npc_steal,
            player_steal,
            steal_defense,
            steal_dodge,
            revenge,
            npc_vs_npc,
          ]
    uses: ./.github/workflows/playtest-runner.yml
    with:
      scenario: ${{ matrix.scenario }}
      run-playtest: ${{ needs.changes.outputs.code == 'true' }}

  campaign-full:
    needs: changes
    if: github.event_name == 'push'
    uses: ./.github/workflows/playtest-runner.yml
    with:
      scenario: campaign_full
      run-playtest: ${{ needs.changes.outputs.code == 'true' }}

name: Playtest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR when new commits land; let main runs
# complete so every merged commit is verified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  playtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache the downloaded .deb archives so ci-deps.sh's apt-get install
      # skips the network fetch on a cache hit — apt still resolves/unpacks,
      # but the slow, flake-prone download is avoided.
      - name: Cache apt archives
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          key: ${{ runner.os }}-apt-${{ hashFiles('scripts/ci-deps.sh') }}

      # Install the system libraries from default.nix via apt and configure a
      # headless null-audio device (no Nix in this job — see PR #16).
      - name: Install system dependencies
        run: bash scripts/ci-deps.sh

      # scripts/playtest.sh auto-detects the absence of Nix and falls back to
      # plain cargo, wrapping the bot in xvfb with a software GL backend.
      - name: Build and run playtests
        run: bash scripts/playtest.sh

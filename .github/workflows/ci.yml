name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      # Transparent Nix store cache — first hit re-uses all unchanged store paths,
      # subsequent runs only rebuild what changed (deps, game source, shaders).
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build
        run: nix build .#packages.x86_64-linux.default

      # Unit tests run headlessly (no GPU/window needed) — they verify mechanic predicates
      # like Tutorial::passed() so a broken mechanic fails CI, not just a failed build.
      - name: Test
        run: nix develop . --command cargo test

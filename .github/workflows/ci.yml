name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR when new commits land; let main runs
# complete so every merged commit is verified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    # lld links noticeably faster than the default bfd linker for this binary's
    # size, and every incremental rebuild in this job pays that link cost.
    # ci-deps.sh installs lld alongside the other system libraries.
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
    steps:
      - uses: actions/checkout@v4

      # Incremental cargo cache keyed on the lockfile — subsequent runs only
      # recompile what changed instead of the whole dependency tree.
      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache the downloaded .deb files for scripts/ci-deps.sh's apt install so
      # a warm cache skips the network fetch (the observed long pole in a
      # cold run — see the Playtest job's equivalent step). apt still detects
      # version mismatches and re-fetches when needed, so a stale cache just
      # falls back to today's behavior, never breaking the install.
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('scripts/ci-deps.sh') }}

      # System libraries from default.nix via apt + a headless audio device, so
      # this gate runs on plain cargo (no Nix). The heavy `nix build` package
      # verification moved to nix.yml, which runs post-merge on main only.
      - name: Install system dependencies
        run: bash scripts/ci-deps.sh

      - name: Build
        run: cargo build

      # Headless unit tests — they verify mechanic predicates like
      # Tutorial::passed() so a broken mechanic fails CI, not just a failed build.
      - name: Test
        run: cargo test

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR when new commits land; let main runs
# complete so every merged commit is verified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Incremental cargo cache keyed on the lockfile — subsequent runs only
      # recompile what changed instead of the whole dependency tree.
      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache downloaded .deb files so ci-deps.sh's apt-get install doesn't
      # re-fetch the same packages every run (or from every job in the
      # playtest matrix). Keyed on the script itself so a package list change
      # busts the cache.
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: ${{ runner.os }}-apt-${{ hashFiles('scripts/ci-deps.sh') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      # System libraries from default.nix via apt + a headless audio device, so
      # this gate runs on plain cargo (no Nix). The heavy `nix build` package
      # verification moved to nix.yml, which runs post-merge on main only.
      - name: Install system dependencies
        run: bash scripts/ci-deps.sh
        env:
          APT_CACHE_DIR: ~/apt-cache

      - name: Build
        run: cargo build

      # Headless unit tests — they verify mechanic predicates like
      # Tutorial::passed() so a broken mechanic fails CI, not just a failed build.
      - name: Test
        run: cargo test

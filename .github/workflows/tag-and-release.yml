name: Tag and Release

# Closes the release loop with no human in it.
#
# The Release Manager routine bumps `version` in Cargo.toml + CHANGELOG.md and
# lands it on `main` as a `Release <x>` commit, but it CANNOT push a git tag from
# the sandbox (HTTP 403), so `release.yml` — which only fired on `vX.Y.Z` tag
# pushes — never ran and no GitHub Release was ever cut.
#
# This workflow runs on every push to `main`: it reads the current Cargo.toml
# version and, if no GitHub *Release* exists for it yet, ensures the `vX.Y.Z` tag
# exists (creating + pushing an annotated tag, notes from the CHANGELOG section,
# if missing) then calls release.yml directly to build the binaries and publish
# the release. It calls release.yml rather than relying on the tag push to trigger
# it, because a tag pushed with GITHUB_TOKEN does not re-trigger `on: push: tags`.
#
# Gating on Release existence (not just tag existence) makes it self-healing: if a
# prior run tagged the version but failed to publish the release, the next push
# re-publishes it instead of skipping because the tag is already there.
#
# Idempotent: if a Release already exists for the current version, it does nothing.

# Triggers: a human push to `main` fires `push` directly. But the normal flow is a
# Release Manager PR that the Auto-merge workflow squash-merges with GITHUB_TOKEN —
# and a GITHUB_TOKEN push does NOT trigger `on: push` (the same recursion rule that
# stops a token-pushed tag from firing release.yml). So we also key off the
# Auto-merge workflow completing: after any auto-merge run, re-check whether the
# current version needs releasing. The release-existence gate makes the extra runs
# cheap no-ops. `workflow_dispatch` allows manual/backfill triggering for any tag.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: [Auto-merge]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: tag-and-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure a tag exists for the current version if unreleased
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Gate on Release existence, not tag existence, so a version that got
          # tagged but never published (e.g. a prior failed release run) self-heals.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — nothing to do."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # A Release is missing. Make sure the tag exists (a prior run may have
          # created it before failing to publish), then let the release job run.
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists but has no Release — re-publishing."
            echo "created=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pull release notes from the matching CHANGELOG.md section, if present.
          NOTES=$(awk -v ver="${VERSION}" '
            $0 ~ ("^## v?" ver "([^0-9]|$)") { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md || true)
          if [ -z "${NOTES//[$'\n\r\t ']/}" ]; then
            NOTES="Release ${TAG}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}" -m "${NOTES}"
          git push origin "${TAG}"
          echo "Created and pushed ${TAG}."
          echo "created=true" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    permissions:
      contents: write
    secrets: inherit
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}

name: Release

# Builds the cross-platform binaries and cuts a GitHub Release for a version tag.
#
# Two entry points, both landing on the same build/release jobs:
#   * push of a `vX.Y.Z` tag        — manual/backfill releases
#   * workflow_call with `tag` input — the autonomous path, invoked by
#     tag-and-release.yml when a `Release` commit lands on `main` (a
#     GITHUB_TOKEN-pushed tag can't re-trigger `on: push: tags`, so the tagger
#     calls this workflow directly instead of relying on the tag-push event).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_call:
    inputs:
      tag:
        description: "The vX.Y.Z tag to build and publish a release for"
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            archive: linux-x86_64.tar.gz
            exe: rustler

          - os: windows-latest
            target: x86_64-windows
            archive: windows-x86_64.tar.gz
            exe: rustler.exe

          - os: macos-latest
            target: aarch64-darwin
            archive: macos-aarch64.tar.gz
            exe: rustler
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}

      - uses: DeterminateSystems/nix-installer-action@main
        if: matrix.os != 'windows-latest'
      - name: Cache Nix dependencies
        uses: DeterminateSystems/magic-nix-cache-action@main
        if: matrix.os != 'windows-latest'
      - name: Build with Nix
        if: matrix.os != 'windows-latest'
        run: nix build

      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        if: matrix.os == 'windows-latest'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build with Cargo
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo build --release
          mkdir -p result/bin
          cp target/release/${{ matrix.exe }} result/bin/
          cp -r resources result/bin/

      - name: Package program
        shell: bash
        run: |
          mkdir -p dist
          cp result/bin/${{ matrix.exe }} dist/
          cp -r result/bin/resources dist/
          tar -czf "rustler-${TAG}-${{ matrix.archive }}" -C dist .

      - name: Upload program
        uses: actions/upload-artifact@v7
        with:
          name: rustler-${{ matrix.target }}
          path: rustler-${{ env.TAG }}-${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG}" rustler-*.tar.gz \
            --repo "${{ github.repository }}" \
            --title "Crab Rustler ${TAG}" \
            --verify-tag \
            --notes-from-tag \
            --discussion-category "General"

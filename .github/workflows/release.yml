name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            archive: linux-x86_64.tar.gz
            exe: rustler

          - os: windows-latest
            target: x86_64-windows
            archive: windows-x86_64.tar.gz
            exe: rustler.exe

          - os: macos-latest
            target: aarch64-darwin
            archive: macos-aarch64.tar.gz
            exe: rustler
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@main
        if: matrix.os != 'windows-latest'
      - name: Cache Nix dependencies
        uses: DeterminateSystems/magic-nix-cache-action@main
        if: matrix.os != 'windows-latest'
      - name: Build with Nix
        if: matrix.os != 'windows-latest'
        run: nix build

      - name: Cache Cargo dependencies
        uses: actions/cache@v6
        if: matrix.os == 'windows-latest'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build with Cargo
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cargo build --release
          mkdir -p result/bin
          cp target/release/${{ matrix.exe }} result/bin/
          cp -r resources result/bin/

      - name: Package program
        shell: bash
        run: |
          mkdir -p dist
          cp result/bin/${{ matrix.exe }} dist/
          cp -r result/bin/resources dist/
          tar -czf rustler-${{ github.ref_name }}-${{ matrix.archive }} -C dist .

      - name: Upload program
        uses: actions/upload-artifact@v7
        with:
          name: rustler-${{ matrix.target }}
          path: rustler-${{ github.ref_name }}-${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" rustler-*.tar.gz \
            --repo "${{ github.repository }}" \
            --title "Crab Rustler ${{ github.ref_name }}" \
            --generate-notes

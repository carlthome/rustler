name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR when new commits land; let main runs
# complete so every merged commit is verified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect whether anything other than Markdown changed. Docs-only PRs skip the
  # expensive steps below, but the `build` job still runs and reports success — so
  # the required `build` status check is present + green and branch protection /
  # auto-merge stay satisfied (unlike paths-ignore, which omits the check entirely
  # and blocks docs PRs). Native git diff, no external action.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect non-Markdown changes
        id: detect
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if [ -z "$BASE" ]; then BASE="${{ github.event.before }}"; HEAD="${{ github.sha }}"; fi
          # Default to running everything if the base can't be resolved (safe).
          if [ -z "$BASE" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          echo "Changed files:"; echo "$CHANGED"
          # code=true unless EVERY changed file ends in .md (empty diff → true, safe).
          if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qvE '\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false (docs-only)"; echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Incremental cargo cache keyed on the lockfile — subsequent runs only
      # recompile what changed instead of the whole dependency tree.
      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache the downloaded .deb files for scripts/ci-deps.sh's apt install so
      # a warm cache skips the network fetch (the observed long pole in a
      # cold run — see the Playtest job's equivalent step). apt still detects
      # version mismatches and re-fetches when needed, so a stale cache just
      # falls back to today's behavior, never breaking the install.
      #
      # Only cache the *.deb files, not the whole archives dir: apt-get leaves
      # behind archives/lock (root:root, mode 640) and archives/partial/
      # (_apt:root, mode 700), both unreadable by the non-root runner user, so
      # caching the directory made every save fail with "Permission denied"
      # and the restore always miss — this cache never actually worked.
      - name: Cache apt packages
        uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives/*.deb
          key: ${{ runner.os }}-apt-${{ hashFiles('scripts/ci-deps.sh') }}

      # System libraries from default.nix via apt + a headless audio device, so
      # this gate runs on plain cargo (no Nix). The heavy `nix build` package
      # verification moved to nix.yml, which runs post-merge on main only.
      - name: Install system dependencies
        if: needs.changes.outputs.code == 'true'
        run: bash scripts/ci-deps.sh

      - name: Build
        if: needs.changes.outputs.code == 'true'
        run: cargo build

      # Headless unit tests — they verify mechanic predicates like
      # Tutorial::passed() so a broken mechanic fails CI, not just a failed build.
      - name: Test
        if: needs.changes.outputs.code == 'true'
        run: cargo test

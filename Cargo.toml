[package]
name = "rustler"
version = "0.12.0"
edition = "2024"

[dependencies]
crevice = "0.13.0"
ggez = "0.9.3"
lewton = "0.10"
rand = "0.9.1"

[[bin]]
name = "rustler"
path = "src/main.rs"

[package.metadata.ggez]
resources = ["resources"]

[patch.crates-io]
winit = { path = "vendor/winit-0.28.7" }
